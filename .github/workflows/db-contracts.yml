name: DB Contracts

on:
  pull_request:
    paths:
      - ".github/workflows/db-contracts.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "lib/db-trading/**"
      - "lib/db-timescale/**"
      - "apps-trading/view-next/**"
      - "apps-trading/tradingview-node/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/db-contracts.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "lib/db-trading/**"
      - "lib/db-timescale/**"
      - "apps-trading/view-next/**"
      - "apps-trading/tradingview-node/**"
  workflow_dispatch:

jobs:
  verify-trading:
    name: Verify Trading contract
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.9
        env:
          POSTGRES_DB: app_contracts
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d app_contracts"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      TRADING_DB_URL: postgres://postgres:postgres@localhost:5432/app_contracts
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install PostgreSQL 17 client tools
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-common ca-certificates
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install -y postgresql-client-17
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"

      - name: Show PostgreSQL versions
        run: |
          which psql
          which pg_dump
          pg_dump --version
          psql --version
          psql "$TRADING_DB_URL" -Atqc "SELECT version()"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify @lib/db-trading
        run: pnpm --filter @lib/db-trading db:verify

  verify-timescale:
    name: Verify Timescale contract
    runs-on: ubuntu-latest
    services:
      timescale:
        image: timescale/timescaledb:2.25.2-pg17
        env:
          POSTGRES_DB: app_contracts
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d app_contracts"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      TIMESCALE_DB_URL: postgres://postgres:postgres@localhost:5432/app_contracts
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install PostgreSQL 17 client tools
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-common ca-certificates
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install -y postgresql-client-17
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"

      - name: Show PostgreSQL versions
        run: |
          which psql
          which pg_dump
          pg_dump --version
          psql --version
          psql "$TIMESCALE_DB_URL" -Atqc "SELECT version()"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify @lib/db-timescale
        run: pnpm --filter @lib/db-timescale db:verify
