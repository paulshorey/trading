name: DB Production Parity

on:
  workflow_dispatch:
    inputs:
      target:
        description: Production database to compare against the repo contract
        required: true
        type: choice
        default: both
        options:
          - both
          - trading
          - timescale

permissions:
  contents: read

concurrency:
  group: db-production-parity
  cancel-in-progress: false

jobs:
  verify-trading:
    name: Verify production trading parity
    if: ${{ github.event.inputs.target == 'both' || github.event.inputs.target == 'trading' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production-db-parity
    env:
      TRADING_DB_URL: ${{ secrets.TRADING_DB_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install PostgreSQL 17 client tools
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-common ca-certificates
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install -y postgresql-client-17
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"

      - name: Show PostgreSQL versions
        run: |
          which psql
          which pg_dump
          psql --version
          pg_dump --version
          psql "$TRADING_DB_URL" -Atqc "SELECT current_setting('server_version_num')"

      - name: Install dependencies
        run: pnpm run deps:install -- @lib/db-trading...

      - name: Verify production trading DB parity
        run: pnpm --filter @lib/db-trading db:verify:readonly

  verify-timescale:
    name: Verify production Timescale parity
    if: ${{ github.event.inputs.target == 'both' || github.event.inputs.target == 'timescale' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production-db-parity
    env:
      TIMESCALE_DB_URL: ${{ secrets.TIMESCALE_DB_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install PostgreSQL 17 client tools
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-common ca-certificates
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install -y postgresql-client-17
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"

      - name: Show PostgreSQL versions
        run: |
          which psql
          which pg_dump
          psql --version
          pg_dump --version
          psql "$TIMESCALE_DB_URL" -Atqc "SELECT current_setting('server_version_num')"

      - name: Install dependencies
        run: pnpm run deps:install -- @lib/db-timescale...

      - name: Verify production Timescale DB parity
        run: pnpm --filter @lib/db-timescale db:verify:readonly
