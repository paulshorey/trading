<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fractal Financial Waves</title>
    <style>
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #0a0a0a;
      }
      /* Ensure the canvas covers the viewport exactly */
      canvas {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        display: block;
      }
    </style>
  </head>
  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
      // Scene setup
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a0a0a);

      const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 1000);
      camera.position.z = 1;

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(window.innerWidth, window.innerHeight, false);
      document.body.appendChild(renderer.domElement);

      // Wave parameters
      const waveResolution = 500; // Number of points per wave

      // Create material for lines (note: linewidth is ignored in most browsers' WebGL)
      const createLineMaterial = (color, opacity = 1) => new THREE.LineBasicMaterial({ color, opacity, transparent: true });

      const largeMaterial = createLineMaterial(0x00ffff, 0.5);
      const mediumMaterial = createLineMaterial(0xff00ff, 0.8);
      const smallMaterial = createLineMaterial(0xffff00, 1.0);

      // Geometry with normalized X in [-1, 1]; we'll scale to aspect
      function createWaveGeometry() {
        const points = [];
        for (let i = 0; i <= waveResolution; i++) {
          const x = (i / waveResolution) * 2 - 1; // [-1, 1]
          points.push(new THREE.Vector3(x, 0, 0));
        }
        return new THREE.BufferGeometry().setFromPoints(points);
      }

      const largeWaveGeometry = createWaveGeometry();
      const mediumWaveGeometry = createWaveGeometry();
      const smallWaveGeometry = createWaveGeometry();

      const largeWave = new THREE.Line(largeWaveGeometry, largeMaterial);
      const mediumWave = new THREE.Line(mediumWaveGeometry, mediumMaterial);
      const smallWave = new THREE.Line(smallWaveGeometry, smallMaterial);

      scene.add(largeWave, mediumWave, smallWave);

      // Animation timers
      let largeTime = 0;
      let mediumTime = 0;
      let smallTime = 0;

      // Update camera + scale waves in X so x ∈ [-aspect, +aspect] fills width
      function fitToViewport() {
        const aspect = window.innerWidth / window.innerHeight;
        camera.left = -aspect;
        camera.right = aspect;
        camera.top = 1;
        camera.bottom = -1;
        camera.updateProjectionMatrix();

        // Stretch the lines horizontally to fill the frustum width
        largeWave.scale.set(aspect, 1, 1);
        mediumWave.scale.set(aspect, 1, 1);
        smallWave.scale.set(aspect, 1, 1);

        renderer.setSize(window.innerWidth, window.innerHeight, false);
      }

      function updateWaves() {
        const lp = largeWaveGeometry.attributes.position.array;
        const mp = mediumWaveGeometry.attributes.position.array;
        const sp = smallWaveGeometry.attributes.position.array;

        // Write Y values first, track global min/max across all three lines
        let minY = Infinity,
          maxY = -Infinity;

        for (let i = 0; i <= waveResolution; i++) {
          const x = (i / waveResolution) * 2 - 1; // normalized x
          const idx = i * 3;
          const yIdx = idx + 1;

          // Base large wave
          const largeY = Math.sin(x * Math.PI * 1 + largeTime) * 0.3;
          lp[yIdx] = largeY;

          // Medium modulates on top of large
          const mediumOsc = Math.sin(x * Math.PI * 2 + mediumTime) * 0.3;
          const mediumY = largeY + mediumOsc;
          mp[yIdx] = mediumY;

          // Small modulates on top of medium
          const smallOsc = Math.sin(x * Math.PI * 10 + smallTime) * 0.15;
          const smallY = mediumY + smallOsc;
          sp[yIdx] = smallY;

          // Track min/max across all three at this sample
          if (largeY < minY) minY = largeY;
          if (mediumY < minY) minY = mediumY;
          if (smallY < minY) minY = smallY;
          if (largeY > maxY) maxY = largeY;
          if (mediumY > maxY) maxY = mediumY;
          if (smallY > maxY) maxY = smallY;
        }

        // Normalize vertically so the tallest span fits exactly [-1, +1]
        const span = Math.max(1e-6, maxY - minY);
        const center = (maxY + minY) / 2;
        const scaleY = 2 / span; // maps [minY, maxY] -> [-1, +1]

        for (let i = 0; i <= waveResolution; i++) {
          const yIdx = i * 3 + 1;
          lp[yIdx] = (lp[yIdx] - center) * scaleY;
          mp[yIdx] = (mp[yIdx] - center) * scaleY;
          sp[yIdx] = (sp[yIdx] - center) * scaleY;
        }

        largeWaveGeometry.attributes.position.needsUpdate = true;
        mediumWaveGeometry.attributes.position.needsUpdate = true;
        smallWaveGeometry.attributes.position.needsUpdate = true;
      }

      function animate() {
        requestAnimationFrame(animate);
        largeTime += 0.005; // large timeframe
        mediumTime += 0.01; // medium timeframe
        smallTime += 0.02; // smallest timeframe
        updateWaves();
        renderer.render(scene, camera);
      }

      window.addEventListener("resize", fitToViewport);

      // Initial fit and go
      fitToViewport();
      animate();
    </script>
  </body>
</html>
