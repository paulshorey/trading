<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fractal Financial Waves</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #0a0a0a;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
      // Scene setup
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a0a0a);

      const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 1000);
      camera.position.z = 1;

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      // Wave parameters
      const waveResolution = 500; // Number of points per wave

      // Create material for lines
      const createLineMaterial = (color, opacity = 1, linewidth = 2) => {
        return new THREE.LineBasicMaterial({
          color: color,
          opacity: opacity,
          transparent: true,
          linewidth: linewidth,
        });
      };

      // Materials for each wave
      const largeMaterial = createLineMaterial(0x00ffff, 0.5, 3);
      const mediumMaterial = createLineMaterial(0xff00ff, 1.0, 2);

      // Create wave geometry
      function createWaveGeometry() {
        const points = [];
        for (let i = 0; i <= waveResolution; i++) {
          const x = (i / waveResolution) * 2 - 1;
          points.push(new THREE.Vector3(x, 0, 0));
        }
        const geometry = new THREE.BufferGeometry().setFromPoints(points);
        return geometry;
      }

      // Create two wave lines
      const largeWaveGeometry = createWaveGeometry();
      const mediumWaveGeometry = createWaveGeometry();

      const largeWave = new THREE.Line(largeWaveGeometry, largeMaterial);
      const mediumWave = new THREE.Line(mediumWaveGeometry, mediumMaterial);

      scene.add(largeWave);
      scene.add(mediumWave);

      // Animation timers
      let largeTime = 0;
      let mediumTime = 0;

      function updateWaves() {
        const largePositions = largeWaveGeometry.attributes.position.array;
        const mediumPositions = mediumWaveGeometry.attributes.position.array;

        for (let i = 0; i <= waveResolution; i++) {
          const x = (i / waveResolution) * 2 - 1;
          const xIndex = i * 3;
          const yIndex = i * 3 + 1;

          // Large wave - wider frequency (1 full cycle), smaller amplitude
          const largeY = Math.sin(x * Math.PI * 1 + largeTime) * 0.4;
          largePositions[yIndex] = largeY;

          // Medium wave - this should oscillate AROUND the large wave position
          // First, get the exact Y position of the large wave at this X coordinate
          const largeWaveYAtThisPoint = Math.sin(x * Math.PI * 1 + largeTime) * 0.4;

          // Now create the medium wave oscillation centered at 0
          const mediumOscillation = Math.sin(x * Math.PI * 16 - mediumTime) * 0.3;

          // Place the medium wave so it oscillates around the large wave's position
          mediumPositions[yIndex] = largeWaveYAtThisPoint + mediumOscillation;
        }

        largeWaveGeometry.attributes.position.needsUpdate = true;
        mediumWaveGeometry.attributes.position.needsUpdate = true;
      }

      // Animation loop
      function animate() {
        requestAnimationFrame(animate);

        // Different speeds for each wave
        largeTime += 0.003; // Slower movement for the wider wave
        mediumTime += 0.035; // Much faster, creating independent motion

        updateWaves();

        renderer.render(scene, camera);
      }

      // Handle window resize
      window.addEventListener("resize", () => {
        const aspect = window.innerWidth / window.innerHeight;

        // Update camera
        camera.left = -aspect;
        camera.right = aspect;
        camera.top = 1;
        camera.bottom = -1;
        camera.updateProjectionMatrix();

        // Update renderer
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      // Adjust initial aspect ratio
      const initialAspect = window.innerWidth / window.innerHeight;
      camera.left = -initialAspect;
      camera.right = initialAspect;
      camera.updateProjectionMatrix();

      // Start animation
      animate();
    </script>
  </body>
</html>
